function loadPhoto() {
    const random = ids[Math.floor(Math.random()*ids.length)];
    const imgElement = document.getElementById("photo");
    const errorElement = document.getElementById("error");
    
    // Use direct Google Drive export URL
    imgElement.src = `https://drive.google.com/uc?export=view&id=${random}&t=${Date.now()}`;
    
    imgElement.onload = () => {
        imgElement.style.opacity = 1;
        errorElement.textContent = "";
    };
    
    imgElement.onerror = () => {
        errorElement.textContent = "Loading image...";
        // Retry with alternative method
        setTimeout(() => {
            imgElement.src = `https://lh3.googleusercontent.com/d/${random}=w1000`;
        }, 500);
    };
}

// Load initial photo on page load
window.addEventListener('load', loadPhoto);

// Refresh photo on tap/click
document.addEventListener('click', loadPhoto);
document.addEventListener('touchend', loadPhoto);
